<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Ranger Mega-App</title>
    <style>
        :root { --primary: #2c5e2e; --accent: #d4af37; --bg: #0d1117; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; overscroll-behavior-y: contain; }
        .card { background: #161b22; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); border: 1px solid #30363d; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; margin: 5px 0; font-weight: bold; cursor: pointer; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; margin-top: 15px; }
        .stat-box { border: 1px solid #444; padding: 5px; border-radius: 5px; background: #0d1117; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #161b22; width: 85%; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="setup-menu" class="card" style="border: 2px solid #2e7d32;">
    <h2 style="text-align:center;">Ranger Creator</h2>
    <input type="text" id="name-input" placeholder="Enter Hero Name" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <select id="race-input" style="width:100%; padding:10px; margin-bottom:10px;">
        <option value="Human">Human (+1 All Stats)</option>
        <option value="Elf">Elf (+2 DEX, +1 WIS)</option>
        <option value="Dwarf">Dwarf (+2 CON, +1 STR)</option>
        <option value="Halfling">Halfling (+2 DEX, +1 CHA)</option>
        <option value="Tiefling">Tiefling (+2 CHA, +1 INT)</option>
        <option value="Dragonborn">Dragonborn (+2 STR, +1 CHA)</option>
        <option value="Gnome">Gnome (+2 INT, +1 CON)</option>
        <option value="Half-Elf">Half-Elf (+2 CHA, +1 DEX, +1 WIS)</option>
        <option value="Half-Orc">Half-Orc (+2 STR, +1 CON)</option>
    </select>
    <button class="btn" onclick="generateStats()">🎲 Roll Stats</button>
    <div id="roll-display" style="text-align:center; margin:10px; color: #2e7d32; font-weight:bold;"></div>
    <button class="btn" onclick="finalizeCharacter()" style="background:#2e7d32;">Finalize Character</button>
</div>

<div id="main-sheet" style="display:none;">
    <h2 id="display-name" style="text-align: center; margin-bottom: 2px;"></h2>
    <p id="display-race-class" style="text-align: center; color: #aaa;"></p>
    
    <div class="stat-grid">
        <div class="stat-box"><strong>DEX</strong><br><span id="val-dex">10</span></div>
        <div class="stat-box"><strong>WIS</strong><br><span id="val-wis">10</span></div>
        <div class="stat-box"><strong>CON</strong><br><span id="val-con">10</span></div>
        <div class="stat-box"><strong>STR</strong><br><span id="val-str">10</span></div>
        <div class="stat-box"><strong>INT</strong><br><span id="val-int">10</span></div>
        <div class="stat-box"><strong>CHA</strong><br><span id="val-cha">10</span></div>
    </div>

    <div style="display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
        <div><strong>HP:</strong> <span id="val-hp" style="color:#ffd700;">12</span></div>
        <div><strong>Prof:</strong> +<span id="val-prof">2</span></div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>Features & Spells</h3>
        <div id="feature-list"></div>
    </div>

    <button class="btn" onclick="askLevelUp()">LEVEL UP TO <span id="next-lv-num">2</span></button>
</div>

<div id="modal-overlay"><div class="modal-box"><h2 id="modal-title"></h2><p id="modal-text"></p><button class="btn" id="final-confirm-btn">CONFIRM</button><button class="btn" onclick="closeModal()" style="background:#444;">CANCEL</button></div></div>

<button class="btn" onclick="factoryReset()" style="background:#8b0000; margin-top:50px; opacity:0.6;">⚠️ FACTORY RESET</button>

<script>
let tempRolls = [];
let marco = { level: 1, hp: 12, name: "", race: "", stats: {dex:10, wis:10, con:10, str:10, int:10, cha:10}, lockedFeatures: ["Favored Enemy", "Natural Explorer"] };

function generateStats() {
    tempRolls = Array.from({length: 6}, () => Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + 8).sort((a, b) => b - a);
    document.getElementById('roll-display').innerText = "Rolls: " + tempRolls.join(", ");
}

function finalizeCharacter() {
    let name = document.getElementById('name-input').value;
    let race = document.getElementById('race-input').value;
    if (!name || tempRolls.length === 0) return alert("Roll stats first!");

    marco.name = name; marco.race = race;
    marco.stats = { dex: tempRolls[0], wis: tempRolls[1], con: tempRolls[2], str: tempRolls[3], int: tempRolls[4], cha: tempRolls[5] };

    if (race === "Human") Object.keys(marco.stats).forEach(s => marco.stats[s] += 1);
    if (race === "Elf") { marco.stats.dex += 2; marco.stats.wis += 1; }
    if (race === "Dwarf") { marco.stats.con += 2; marco.stats.str += 1; }
    if (race === "Halfling") { marco.stats.dex += 2; marco.stats.cha += 1; }
    if (race === "Tiefling") { marco.stats.cha += 2; marco.stats.int += 1; }
    if (race === "Dragonborn") { marco.stats.str += 2; marco.stats.cha += 1; }
    if (race === "Gnome") { marco.stats.int += 2; marco.stats.con += 1; }
    if (race === "Half-Elf") { marco.stats.cha += 2; marco.stats.dex += 1; marco.stats.wis += 1; }
    if (race === "Half-Orc") { marco.stats.str += 2; marco.stats.con += 1; }

    marco.hp = 10 + Math.floor((marco.stats.con - 10) / 2);
    saveAndRefresh();
}

function askLevelUp() {
    const modal = document.getElementById('modal-overlay');
    document.getElementById('modal-title').innerText = "Level Up?";
    document.getElementById('modal-text').innerText = `Advance to Level ${marco.level + 1}?`;
    modal.style.display = 'flex';
    document.getElementById('final-confirm-btn').onclick = () => {
        marco.level++; marco.hp += (6 + Math.floor((marco.stats.con - 10) / 2));
        modal.style.display = 'none'; saveAndRefresh();
    };
}

function saveAndRefresh() {
    localStorage.setItem('marco_mega_sheet', JSON.stringify(marco));
    updateUI();
}

function updateUI() {
    if (!marco.name) return;
    document.getElementById('setup-menu').style.display = 'none';
    document.getElementById('main-sheet').style.display = 'block';
    document.getElementById('display-name').innerText = marco.name;
    document.getElementById('display-race-class').innerText = `Level ${marco.level} ${marco.race} Ranger`;
    document.getElementById('next-lv-num').innerText = marco.level + 1;
    
    for (let s in marco.stats) { document.getElementById('val-' + s).innerText = marco.stats[s]; }
    document.getElementById('val-hp').innerText = marco.hp;
    document.getElementById('val-prof').innerText = Math.ceil(1 + (marco.level / 4));
    document.getElementById('feature-list').innerHTML = marco.lockedFeatures.map(f => `<div>🔒 ${f}</div>`).join('');
}

function factoryReset() { if (confirm("Wipe character?")) { localStorage.removeItem('marco_mega_sheet'); location.reload(); } }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

window.onload = () => {
    let d = localStorage.getItem('marco_mega_sheet');
    if (d) { marco = JSON.parse(d); updateUI(); }
};
</script>
</body>
</html>
