<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D 2024 Creator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root { --primary: #e67e22; --bg: #1a1a1a; --card: #2c3e50; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #444; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 1.4em; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8em; color: #bdc3c7; }
        select { width: 100%; padding: 12px; border-radius: 6px; background: #34495e; color: white; border: 1px solid #444; font-size: 16px; }
        button { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 6px; color: white; font-size: 18px; font-weight: bold; margin: 10px 0; }
        
        /* Stats Styling */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #1a1a1a; padding: 8px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--primary); }
        .label { font-size: 0.65em; text-transform: uppercase; color: #95a5a6; }
        .value { font-size: 1.5em; font-weight: bold; }
        .modifier { color: var(--primary); font-size: 0.9em; font-weight: bold; }

        /* Combat Styling */
        .combat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .combat-box { background: #16212c; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--primary); }
        .combat-val { font-size: 1.3em; font-weight: bold; color: white; }

        .traits-box { background: #1a1a1a; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); font-size: 0.85em; }
        .section-title { color: var(--primary); font-weight: bold; font-size: 0.75em; text-transform: uppercase; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>D&D 2024 Creator</h2>
    
    <div class="input-group">
        <label>Species</label>
        <select id="speciesSelect">
            <option value="Human">Human</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Halfling">Halfling</option>
            <option value="Dragonborn">Dragonborn</option>
            <option value="Goliath">Goliath</option>
            <option value="Orc">Orc</option>
            <option value="Gnome">Gnome</option>
            <option value="Tiefling">Tiefling</option>
            <option value="Aasimar">Aasimar</option>
        </select>
    </div>

    <div class="input-group">
        <label>Class</label>
        <select id="classSelect">
            <option value="Fighter">Fighter</option>
            <option value="Rogue">Rogue</option>
            <option value="Wizard">Wizard</option>
            <option value="Cleric">Cleric</option>
            <option value="Paladin">Paladin</option>
            <option value="Barbarian">Barbarian</option>
            <option value="Bard">Bard</option>
            <option value="Druid">Druid</option>
            <option value="Monk">Monk</option>
            <option value="Ranger">Ranger</option>
            <option value="Sorcerer">Sorcerer</option>
            <option value="Warlock">Warlock</option>
        </select>
    </div>

    <div class="input-group">
        <label>Background</label>
        <select id="bgSelect">
            <option value="Soldier">Soldier (Tough Feat)</option>
            <option value="Sage">Sage (Skilled Feat)</option>
            <option value="Acolyte">Acolyte (Magic Initiate)</option>
            <option value="Criminal">Criminal (Alert Feat)</option>
            <option value="Wayfarer">Wayfarer (Lucky Feat)</option>
            <option value="Farmer">Farmer (Tough Feat)</option>
            <option value="Merchant">Merchant (Lucky Feat)</option>
        </select>
    </div>

    <button onclick="generate()">GENERATE CHARACTER</button>

    <div class="combat-row">
        <div class="combat-box"><div class="label">Armor Class</div><div id="ac" class="combat-val">-</div></div>
        <div class="combat-box"><div class="label">Hit Points</div><div id="hp" class="combat-val">-</div></div>
        <div class="combat-box"><div class="label">Initiative</div><div id="init" class="combat-val">-</div></div>
    </div>

    <div class="stat-grid">
        <div class="stat-box"><div class="label">STR</div><div id="str" class="value">-</div><div id="strMod" class="modifier"></div></div>
        <div class="stat-box"><div class="label">DEX</div><div id="dex" class="value">-</div><div id="dexMod" class="modifier"></div></div>
        <div class="stat-box"><div class="label">CON</div><div id="con" class="value">-</div><div id="conMod" class="modifier"></div></div>
        <div class="stat-box"><div class="label">INT</div><div id="int" class="value">-</div><div id="intMod" class="modifier"></div></div>
        <div class="stat-box"><div class="label">WIS</div><div id="wis" class="value">-</div><div id="wisMod" class="modifier"></div></div>
        <div class="stat-box"><div class="label">CHA</div><div id="cha" class="value">-</div><div id="chaMod" class="modifier"></div></div>
    </div>

    <div class="traits-box">
        <span class="section-title">Features & Feats</span>
        <div id="traitsList">Select options and roll...</div>
    </div>
</div>

<script>
    const data = {
        species: {
            "Human": "Inspiration, Extra Origin Feat.", "Elf": "Darkvision, Fey Ancestry.", 
            "Dwarf": "Darkvision 120ft, +1 HP/lvl.", "Halfling": "Lucky (Reroll 1s), Brave.",
            "Dragonborn": "Breath Weapon, Resistance.", "Goliath": "Powerful Build, Speed 35ft.",
            "Orc": "Adrenaline Rush, Endurance.", "Gnome": "Gnomish Cunning.",
            "Tiefling": "Fiendish Legacy.", "Aasimar": "Celestial Revelation."
        },
        classes: {
            "Fighter": { hitDie: 10, prio: ["str", "con", "dex", "wis", "cha", "int"] },
            "Rogue": { hitDie: 8, prio: ["dex", "int", "con", "cha", "wis", "str"] },
            "Wizard": { hitDie: 6, prio: ["int", "con", "dex", "wis", "cha", "str"] },
            "Cleric": { hitDie: 8, prio: ["wis", "con", "str", "int", "cha", "dex"] },
            "Paladin": { hitDie: 10, prio: ["str", "cha", "con", "wis", "dex", "int"] },
            "Barbarian": { hitDie: 12, prio: ["str", "con", "dex", "wis", "cha", "int"] },
            "Bard": { hitDie: 8, prio: ["cha", "dex", "con", "wis", "int", "str"] },
            "Druid": { hitDie: 8, prio: ["wis", "con", "dex", "int", "cha", "str"] },
            "Monk": { hitDie: 8, prio: ["dex", "wis", "con", "str", "cha", "int"] },
            "Ranger": { hitDie: 10, prio: ["dex", "wis", "con", "str", "int", "cha"] },
            "Sorcerer": { hitDie: 6, prio: ["cha", "con", "dex", "int", "wis", "str"] },
            "Warlock": { hitDie: 8, prio: ["cha", "con", "dex", "int", "wis", "str"] }
        },
        bgs: {
            "Soldier": ["str", "con", "Feat: Tough (+2 HP)"], "Sage": ["int", "con", "Feat: Skilled"],
            "Acolyte": ["wis", "cha", "Feat: Magic Initiate"], "Criminal": ["dex", "con", "Feat: Alert"],
            "Wayfarer": ["dex", "wis", "Feat: Lucky"], "Farmer": ["str", "con", "Feat: Tough"],
            "Merchant": ["int", "cha", "Feat: Lucky"]
        }
    };

    function roll4d6() {
        let rolls = Array.from({length: 4}, () => Math.floor(Math.random() * 6) + 1);
        return rolls.sort().slice(1).reduce((a, b) => a + b, 0);
    }

    function generate() {
        let scores = Array.from({length: 6}, () => roll4d6()).sort((a, b) => b - a);
        let clsName = document.getElementById("classSelect").value;
        let bgName = document.getElementById("bgSelect").value;
        let spName = document.getElementById("speciesSelect").value;
        
        let charClass = data.classes[clsName];
        let charBg = data.bgs[bgName];
        let final = {};
        
        charClass.prio.forEach((stat, i) => final[stat] = scores[i]);
        final[charBg[0]] += 2;
        final[charBg[1]] += 1;

        let mods = {};
        for (let s in final) {
            mods[s] = Math.floor((final[s] - 10) / 2);
            document.getElementById(s).innerText = final[s];
            document.getElementById(s + "Mod").innerText = (mods[s] >= 0 ? "+" : "") + mods[s];
        }

        // Combat Math
        let hpBonus = (spName === "Dwarf" || bgName === "Soldier" || bgName === "Farmer") ? 2 : 0;
        document.getElementById("hp").innerText = charClass.hitDie + mods.con + hpBonus;
        document.getElementById("ac").innerText = 10 + mods.dex;
        document.getElementById("init").innerText = (mods.dex >= 0 ? "+" : "") + mods.dex;
        
        document.getElementById("traitsList").innerHTML = `<strong>${spName}:</strong> ${data.species[spName]}<br><strong>Background:</strong> ${charBg[2]}`;
    }
</script>
</body>
</html>
