<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Ranger Mega-App</title>
    <style>
        :root { --primary: #2c5e2e; --accent: #d4af37; --bg: #0d1117; --text: #c9d1d9; --card-bg: #161b22; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; overscroll-behavior-y: contain; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 6px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin: 6px 0; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:active { opacity: 0.7; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; margin-top: 15px; }
        .stat-box { border: 1px solid #444; padding: 8px; border-radius: 8px; background: #0d1117; }
        .stat-label { font-size: 0.75rem; color: #8b949e; display: block; margin-bottom: 4px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .spell-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .spell-btn { background: #30363d; border: 1px solid var(--primary); font-size: 0.8rem; padding: 10px; }
        #setup-menu input, #setup-menu select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; background: #0d1117; border: 1px solid #30363d; color: white; box-sizing: border-box; }
        .badge { background: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; vertical-align: middle; }
    </style>
</head>
<body>

<div id="setup-menu" class="card">
    <h2 style="text-align:center; color:var(--accent);">Create Your Ranger</h2>
    <input type="text" id="name-input" placeholder="Hero Name (e.g. Tully Ocala)">
    <select id="race-input">
        <option value="Human">Human (+1 All Stats)</option>
        <option value="Elf">Elf (+2 DEX, +1 WIS)</option>
        <option value="Dwarf">Dwarf (+2 CON, +1 STR)</option>
        <option value="Halfling">Halfling (+2 DEX, +1 CHA)</option>
        <option value="Tiefling">Tiefling (+2 CHA, +1 INT)</option>
        <option value="Dragonborn">Dragonborn (+2 STR, +1 CHA)</option>
        <option value="Gnome">Gnome (+2 INT, +1 CON)</option>
        <option value="Half-Elf">Half-Elf (+2 CHA, +1 DEX, +1 WIS)</option>
        <option value="Half-Orc">Half-Orc (+2 STR, +1 CON)</option>
    </select>
    <button class="btn" onclick="generateStats()">🎲 Roll Ability Scores</button>
    <div id="roll-display" style="text-align:center; margin:15px; font-size:1.1rem; color:var(--accent); min-height:1.2em;"></div>
    <button class="btn" onclick="finalizeCharacter()" style="background:#238636;">Finalize Character</button>
</div>

<div id="main-sheet" style="display:none;">
    <h1 id="display-name" style="text-align: center; margin: 0; letter-spacing: 1px;"></h1>
    <p id="display-race-class" style="text-align: center; color: #8b949e; margin-top: 5px; font-weight: bold;"></p>
    
    <div class="stat-grid">
        <div class="stat-box"><span class="stat-label">DEX</span><span class="stat-val" id="val-dex"></span></div>
        <div class="stat-box"><span class="stat-label">WIS</span><span class="stat-val" id="val-wis"></span></div>
        <div class="stat-box"><span class="stat-label">CON</span><span class="stat-val" id="val-con"></span></div>
        <div class="stat-box"><span class="stat-label">STR</span><span class="stat-val" id="val-str"></span></div>
        <div class="stat-box"><span class="stat-label">INT</span><span class="stat-val" id="val-int"></span></div>
        <div class="stat-box"><span class="stat-label">CHA</span><span class="stat-val" id="val-cha"></span></div>
    </div>

    <div style="display: flex; justify-content: space-between; margin: 20px 0; padding: 0 10px;">
        <div style="text-align:center;"><strong>HIT POINTS</strong><br><span id="val-hp" style="font-size:1.5rem; color:#ff4500;"></span></div>
        <div style="text-align:center;"><strong>PROFICIENCY</strong><br><span style="font-size:1.5rem;">+<span id="val-prof"></span></span></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; border-bottom:1px solid #30363d; padding-bottom:8px;">Features & Abilities</h3>
        <div id="feature-list" style="line-height:1.6;"></div>
    </div>

    <div id="spell-section" class="card" style="display:none;">
        <h3 style="margin-top:0; border-bottom:1px solid #30363d; padding-bottom:8px;">Spellbook (Level 1)</h3>
        <div id="spell-list" class="spell-grid"></div>
    </div>

    <button class="btn" id="lv-btn" onclick="levelUp()">LEVEL UP</button>
    <button class="btn" onclick="factoryReset()" style="background:#da3633; margin-top:50px; font-size:0.8rem; opacity:0.6;">⚠️ FACTORY RESET</button>
</div>

<script>
const RANGER_DB = {
    races: {
        "Human": {str:1,dex:1,con:1,int:1,wis:1,cha:1}, "Elf": {dex:2,wis:1}, "Dwarf": {con:2,str:1},
        "Halfling": {dex:2,cha:1}, "Tiefling": {cha:2,int:1}, "Dragonborn": {str:2,cha:1},
        "Gnome": {int:2,con:1}, "Half-Elf": {cha:2,dex:1,wis:1}, "Half-Orc": {str:2,con:1}
    },
    spells: ["Cure Wounds", "Hunter's Mark", "Fog Cloud", "Animal Friendship", "Goodberry", "Longstrider", "Ensnaring Strike", "Hail of Thorns"],
    archetypes: ["Hunter", "Gloom Stalker", "Beast Master"]
};

let tempRolls = [];
let marco = { level: 1, hp: 10, name: "", race: "", subclass: "", stats: {}, features: ["Favored Enemy", "Natural Explorer"], spellsKnown: [] };

function generateStats() {
    tempRolls = Array.from({length: 6}, () => {
        let rolls = Array.from({length: 4}, () => Math.floor(Math.random() * 6) + 1).sort((a,b) => b-a);
        return rolls[0] + rolls[1] + rolls[2];
    }).sort((a, b) => b - a);
    document.getElementById('roll-display').innerText = tempRolls.join(" — ");
}

function finalizeCharacter() {
    let name = document.getElementById('name-input').value;
    let race = document.getElementById('race-input').value;
    if (!name || tempRolls.length === 0) return alert("Please enter a name and roll stats!");

    marco.name = name; marco.race = race;
    marco.stats = { dex: tempRolls[0], wis: tempRolls[1], con: tempRolls[2], str: tempRolls[3], int: tempRolls[4], cha: tempRolls[5] };
    
    let bonuses = RANGER_DB.races[race];
    for (let s in bonuses) { marco.stats[s] += bonuses[s]; }
    
    marco.hp = 10 + Math.floor((marco.stats.con - 10) / 2);
    save();
}

function levelUp() {
    marco.level++;
    marco.hp += (6 + Math.floor((marco.stats.con - 10) / 2));
    
    if (marco.level === 3) {
        let choice = prompt("CHOOSE YOUR ARCHETYPE:\n1. Hunter\n2. Gloom Stalker\n3. Beast Master");
        if (choice === "1" || choice.toLowerCase() === "hunter") marco.subclass = "Hunter";
        else if (choice === "2" || choice.toLowerCase() === "gloom stalker") marco.subclass = "Gloom Stalker";
        else if (choice === "3" || choice.toLowerCase() === "beast master") marco.subclass = "Beast Master";
        
        if (marco.subclass) marco.features.push("Archetype: " + marco.subclass);
    }
    save();
}

function learnSpell(spell) {
    if (!marco.spellsKnown.includes(spell)) {
        if (confirm("Learn " + spell + "?")) {
            marco.spellsKnown.push(spell);
            save();
        }
    }
}

function save() {
    localStorage.setItem('ranger_mega_save_v1', JSON.stringify(marco));
    updateUI();
}

function updateUI() {
    if (!marco.name) return;
    document.getElementById('setup-menu').style.display = 'none';
    document.getElementById('main-sheet').style.display = 'block';
    
    document.getElementById('display-name').innerText = marco.name;
    document.getElementById('display-race-class').innerText = `LVL ${marco.level} ${marco.race.toUpperCase()} RANGER ${marco.subclass ? '('+marco.subclass.toUpperCase()+')' : ''}`;
    
    for (let s in marco.stats) { document.getElementById('val-' + s).innerText = marco.stats[s]; }
    document.getElementById('val-hp').innerText = marco.hp;
    document.getElementById('val-prof').innerText = Math.ceil(1 + (marco.level / 4));
    document.getElementById('lv-btn').innerText = `LEVEL UP TO ${marco.level + 1}`;

    // Features List
    document.getElementById('feature-list').innerHTML = marco.features.map(f => `<div><span class="badge">Active</span> ${f}</div>`).join('');
    
    // Spells Logic
    if (marco.level >= 2) {
        document.getElementById('spell-section').style.display = 'block';
        let learnedHTML = marco.spellsKnown.map(s => `<div style="color:var(--accent);">🪄 ${s}</div>`).join('');
        let available = RANGER_DB.spells.filter(s => !marco.spellsKnown.includes(s));
        let buttonsHTML = available.map(s => `<button class="btn spell-btn" onclick="learnSpell('${s}')">+ ${s}</button>`).join('');
        document.getElementById('spell-list').innerHTML = learnedHTML + buttonsHTML;
    }
}

function factoryReset() {
    if (confirm("WIPE CHARACTER AND START NEW?")) {
        localStorage.removeItem('ranger_mega_save_v1');
        location.reload();
    }
}

window.onload = () => {
    let saved = localStorage.getItem('ranger_mega_save_v1');
    if (saved) { marco = JSON.parse(saved); updateUI(); }
};
</script>
</body>
</html>
